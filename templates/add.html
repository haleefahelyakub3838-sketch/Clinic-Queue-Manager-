<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Register Patient - MAUUN</title>
</head>
<body class="bg-gradient-to-br from-blue-50 to-emerald-50 min-h-screen font-sans flex items-center justify-center p-6">
  <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8">
    <h1 class="text-3xl font-bold text-emerald-700 text-center mb-6">Register Patient</h1>
    
    <form method="POST" action="/add" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
        <input type="text" name="name" placeholder="Enter patient name" required 
               class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:outline-none">
      </div>
      
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Age</label>
        <input type="number" name="age" placeholder="Age" required 
               class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:outline-none">
      </div>
      
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Medical Condition</label>
        <input type="text" name="condition" placeholder="e.g. Fever, Checkup" required 
               class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:outline-none">
      </div>
      
      <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-4 rounded-2xl font-semibold text-lg transition shadow-lg">
        Add to Queue
      </button>
    </form>
    
    <div class="mt-6 text-center">
      <a href="/" class="text-emerald-600 hover:underline font-medium">← Back to Dashboard</a>
    </div>
  </div>
</body>
</html>
